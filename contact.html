<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - PowerFit Supplements</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        nav {
            background-color: #1a1a1a;
            width: 100%;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #2d2d2d;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 20px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        nav a:hover { color: #ff3333; }
        header {
            text-align: center;
            padding: 40px 20px;
            background: #1f1f1f;
            width: 100%;
            border-bottom: 2px solid #ff3333;
            box-sizing: border-box;
        }
        header h1 { color: #ff3333; margin: 0; text-transform: uppercase; }
        .form-container {
            max-width: 500px;
            width: 100%;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            margin: 40px 20px;
            border: 1px solid #333;
            box-sizing: border-box;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #ff3333; margin-bottom: 8px; font-size: 0.85rem; font-weight: bold;}
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px; background-color: #121212; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box;
        }
        .btn {
            background-color: #ff3333; color: white; border: none; padding: 12px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; text-transform: uppercase;
        }
        .btn:hover { background-color: #cc0000; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="index.html">Products</a>
        <a href="contact.html">Contact</a>
    </nav>

    <header>
        <h1>Contact Our Experts</h1>
        <p>Get professional advice on your supplement stacks</p>
    </header>

    <div class="form-container">
        <form onsubmit="alert('Message sent successfully! Our fitness team will reach out to you shortly.'); return false;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Your Fitness Goal / Message</label>
                <textarea rows="4" placeholder="Tell us what you're training for..." required></textarea>
            </div>
            <button type="submit" class="btn">Submit Message</button>
        </form>
    </div>

</body>
</html>
